name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with one worker
        run: npm test -- --pool=threads --no-file-parallelism --maxWorkers=1

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Check whitespace errors
        run: git diff --check
