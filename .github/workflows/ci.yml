name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run standard tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Check whitespace errors
        run: git diff --check
